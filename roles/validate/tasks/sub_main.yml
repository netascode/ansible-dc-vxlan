---

- name: Role Entry Point - [cisco.nac_dc_vxlan.validate]
  ansible.builtin.debug:
    msg:
      - "----------------------------------------------------------------"
      - "+     Calling Role - [cisco.nac_dc_vxlan.validate]             +"
      - "----------------------------------------------------------------"

- name: Display Validate Role Info
  ansible.builtin.debug:
    msg:
      - "Role Path - {{ role_path }}"
      - "Inventory Directory - {{ inventory_dir }}"
      - "Workflow - {{ 'Direct to Device (DTD)' if hostvars[inventory_hostname]['ansible_network_os'] == 'cisco.nxos.nxos' else 'Direct to Controller (DTC)' }}"

- name: Check for Schema Path Being Defined
  ansible.builtin.set_fact:
    schema_path: ''
  when: schema_path is not defined
  delegate_to: localhost

- name: Check for Enhanced Roles Path Being Defined
  ansible.builtin.set_fact:
    enhanced_rules_path: ''
  when: enhanced_rules_path is not defined
  delegate_to: localhost

- name: Perform Required Syntax and Semantic Model Validation
  cisco.nac_dc_vxlan.common.nac_dc_validate:
    schema: "{{ schema_path }}"
    mdata: "{{ data_path }}"
    rules: "{{ rules_path }}"
  register: data_model
  vars:
    data_path: "{{ playbook_dir }}/host_vars/{{ inventory_hostname }}"
    rules_path: "{{ role_path }}/files/rules/"
  delegate_to: localhost

- name: Perform Custom Enhanced Syntax and Semantic Model Validation
  cisco.nac_dc_vxlan.common.nac_dc_validate:
    schema: "{{ schema_path }}"
    mdata: "{{ data_path }}"
    rules: "{{ enhanced_rules_path }}"
  vars:
    data_path: "{{ playbook_dir }}/host_vars/{{ inventory_hostname }}"
  when: enhanced_rules_path is defined and enhanced_rules_path
  delegate_to: localhost

- name: Merge factory and custom defaults
  cisco.nac_dc_vxlan.common.merge_defaults:
    factory_defaults_file: "files/defaults.yml"
    data_model: "{{ data_model['data'] }}"
  register: defaults
  delegate_to: localhost

- name: Register Variable With Only Defaults from Previous Task
  ansible.builtin.set_fact:
    defaults: "{{ defaults['defaults'] }}"
  delegate_to: localhost

- name: Prepare Service Model
  cisco.nac_dc_vxlan.common.prepare_service_model:
    inventory_hostname: "{{ inventory_hostname }}"
    hostvars: "{{ hostvars }}"
    data_model: "{{ data_model['data'] }}"
    default_values: "{{ defaults }}"
    templates_path: "{{ role_path }}/../dtc/common/templates/"
  register: smd
  delegate_to: localhost

- name: Store Service Model Data
  ansible.builtin.set_fact:
    data_model: "{{ smd['model_golden'] }}"
    data_model_extended: "{{ smd['model_extended'] }}"
  delegate_to: localhost

- name: Check Roles
  cisco.nac_dc_vxlan.common.check_roles:
    role_list: "{{ ansible_play_role_names }}"
  register: check_roles
  delegate_to: localhost

- name: Read Run Map From Previous Run
  cisco.nac_dc_vxlan.common.read_run_map:
    fabric_name: "{{ data_model_extended.vxlan.fabric.name }}"
    play_tags: "{{ ansible_run_tags }}"
  register: run_map_read_result
  delegate_to: localhost

- name: Set Validate Runtime Mode
  ansible.builtin.set_fact:
    validate_checksum_compare_enabled: >-
      {{
        check_roles['save_previous'] | bool and
        run_map_read_result.diff_run | bool and
        not (force_run_all | default(false) | bool)
      }}
    validate_model_diff_enabled: >-
      {{
        check_roles['save_previous'] | bool and
        run_map_read_result.diff_run | bool and
        not (force_run_all | default(false) | bool) and
        display_model_diff | default(false) | bool
      }}
  delegate_to: localhost

- name: Display Validate Runtime Mode
  ansible.builtin.debug:
    msg:
      - "force_run_all={{ force_run_all | default(false) | bool }}"
      - "diff_run={{ run_map_read_result.diff_run | bool }}"
      - "ansible_run_tags={{ ansible_run_tags }}"
      - "checksum_compare={{ validate_checksum_compare_enabled | bool }}"
      - "display_model_diff={{ validate_model_diff_enabled | bool }}"
  delegate_to: localhost

- name: Initialize Run Map
  cisco.nac_dc_vxlan.common.run_map:
    fabric_name: "{{ data_model_extended.vxlan.fabric.name }}"
    stage: starting_execution
  register: run_map
  delegate_to: localhost

- name: Manage Service Model Data Files
  cisco.nac_dc_vxlan.common.manage_model_files:
    fabric_name: "{{ data_model_extended.vxlan.fabric.name }}"
    data_model: "{{ data_model }}"
    data_model_extended: "{{ data_model_extended }}"
    display_diff: true #"{{ validate_model_diff_enabled | default(false) | bool }}"
    checksum_compare: true #"{{ validate_checksum_compare_enabled | default(false) | bool }}"
    save_previous: "{{ check_roles['save_previous'] }}"
    force_run_all: "{{ force_run_all | default(false) | bool }}"
  register: model_files_result
  when: check_roles['save_previous']
  delegate_to: localhost

- name: Mark All Stages Completed When No Model Changes Detected
  cisco.nac_dc_vxlan.common.run_map:
    fabric_name: "{{ data_model_extended.vxlan.fabric.name }}"
    stage: role_all_completed
  when:
    - model_files_result.skip_validation | default(false)
  delegate_to: localhost

- name: Mark All Stages Completed When Only The Validate Role Is Run
  cisco.nac_dc_vxlan.common.run_map:
    fabric_name: "{{ data_model_extended.vxlan.fabric.name }}"
    stage: role_all_completed
  when: run_map_read_result.validate_only_run is true|bool
  delegate_to: localhost

- name: No Model Changes Detected
  ansible.builtin.meta: end_host
  when:
    - model_files_result.skip_validation | default(false)
