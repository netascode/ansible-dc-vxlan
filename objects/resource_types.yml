# Resource Types Registry
# ----------------------
# Data-driven registry for the build_resource_data plugin.
# Each entry defines the Template→Render→Diff→Flag pipeline config
# for a single NDFC resource type.
#
# Fields:
#   template      - Jinja2 template file (relative to templates dir)
#   output_file   - Rendered YAML output filename
#   change_flag   - Change detection flag name (null = no dedicated flag)
#   diff_compare  - Whether structural diff is needed (vs MD5-only)
#   fabric_types  - List of fabric types this resource applies to
#   pre_hooks     - (optional) Hooks to run before rendering
#   post_hooks    - (optional) Hooks to run after rendering
---
resource_types:

  # ──────────────────────────────────────────────
  # Fabric & Inventory
  # ──────────────────────────────────────────────

  fabric:
    template: ndfc_fabric.j2
    output_file: ndfc_fabric.yml
    change_flag: changes_detected_fabric
    diff_compare: false
    fabric_types:
      - VXLAN_EVPN
      - eBGP_VXLAN
      - ISN
      - MSD
      - MCFG
      - External

  inventory:
    template: ndfc_inventory.j2
    output_file: ndfc_inventory.yml
    change_flag: changes_detected_inventory
    diff_compare: false
    fabric_types:
      - VXLAN_EVPN
      - eBGP_VXLAN
      - ISN
      - External
    pre_hooks:
      - get_poap_data
    post_hooks:
      - get_credentials

  inventory_no_bootstrap:
