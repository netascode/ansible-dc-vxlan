# ══════════════════════════════════════════════════════════════════════════════
# Fabric Types — Namespace, subdirectory, and capability mapping
#
# Consumed by: FabricTypeRegistry, build_resource_data.py
#
# Maps each fabric type to its:
#   - namespace:              Ansible variable namespace for resource data
#   - file_subdir:            Output subdirectory under files/
#   - global_key:             Key into the global config section
#   - fabric_template_dir:    Template subdirectory for fabric-specific templates
#   - supports_overlay:       Whether this fabric type manages VRFs/Networks
#   - supports_vpc:           Whether this fabric type manages vPC peering
#   - supports_multisite:     Whether this is a multisite parent fabric
# ══════════════════════════════════════════════════════════════════════════════
---

fabric_types:

  VXLAN_EVPN:
    namespace: vars_common_vxlan
    file_subdir: vxlan
    global_key: ibgp
    fabric_template_dir: dc_vxlan_fabric
    supports_overlay: true
    supports_vpc: true
    supports_multisite: false

  eBGP_VXLAN:
    namespace: vars_common_ebgp_vxlan
    file_subdir: ebgp_vxlan
    global_key: ebgp
    fabric_template_dir: dc_ebgp_vxlan_fabric
    supports_overlay: true
    supports_vpc: true
    supports_multisite: false

  ISN:
    namespace: vars_common_isn
    file_subdir: isn
    global_key: multisite
    fabric_template_dir: dc_isn_fabric
    supports_overlay: false
    supports_vpc: false
    supports_multisite: false

  MSD:
    namespace: vars_common_msd
    file_subdir: msd
    global_key: msd
    fabric_template_dir: dc_msd_fabric
    supports_overlay: true
    supports_vpc: false
    supports_multisite: true

  MCFG:
    namespace: vars_common_mcfg
    file_subdir: mcfg
    global_key: mcfg
    fabric_template_dir: dc_mcfg_fabric
    supports_overlay: true
    supports_vpc: false
    supports_multisite: true

  External:
    namespace: vars_common_external
    file_subdir: external
    global_key: external
    fabric_template_dir: dc_external_fabric
    supports_overlay: false
    supports_vpc: true
    supports_multisite: false
